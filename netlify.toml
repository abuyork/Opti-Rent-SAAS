# Netlify config. Next.js is handled by Netlify's Next runtime automatically;
# this block covers the plain functions in netlify/functions (the async audit
# scorer). esbuild resolves our "@/..." imports via tsconfig paths and inlines
# the benchmarks JSON files.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Netlify Image CDN allowlist for next/image remote sources (listing photos +
# winner covers). Mirrors images.remotePatterns in next.config.ts.
[images]
  remote_images = ["https://.*\\.muscache\\.com/.*", "https://.*\\.airbnb\\.com/.*"]
